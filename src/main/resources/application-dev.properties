# Development profile with H2 in-memory database
# Run with: mvn spring-boot:run -Dspring-boot.run.profiles=dev

# Server
spring.application.name=movie-ticket-booking
server.port=8080

# H2 Database (in-memory)
spring.datasource.url=jdbc:h2:mem:movie_booking
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Enable H2 Console at http://localhost:8080/h2-console
spring.h2.console.enabled=true

# JPA
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# Seat Hold Configuration
seat.hold.timeout.minutes=10

# Logging
logging.level.org.springframework.security=INFO
logging.level.com.moviebooking=INFO
